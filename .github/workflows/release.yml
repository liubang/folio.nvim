name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout 60s ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="folio"
          if [ "$GOOS" = "windows" ]; then BIN="${BIN}.exe"; fi
          go build -trimpath -ldflags="-s -w" -o "$BIN" ./cmd/folio
          tar -czf "folio-${GOOS}-${GOARCH}.tar.gz" "$BIN"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: folio-${{ matrix.goos }}-${{ matrix.goarch }}
          path: folio-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: folio-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            folio-*.tar.gz
          generate_release_notes: true
