<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>folio preview</title>
  <!-- KaTeX for LaTeX math -->
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
  <!-- Syntax highlight themes -->
  <link rel="stylesheet" href="/vendor/highlight.js/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="/vendor/highlight.js/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <!-- folio's own theme (Minimal-derived design system) -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="folio-overlay">Disconnected — Neovim session ended.</div>

  <!-- TOC toggle button — shown once the document has at least one heading.
       Icon markup is injected by app.js (ICONS.toc) so every SVG icon in the
       app has a single source of truth instead of being duplicated here. -->
  <button class="folio-toc-toggle" id="folio-toc-toggle" title="Table of contents" aria-label="Table of contents"></button>
  <div class="folio-toc-backdrop" id="folio-toc-backdrop"></div>
  <aside class="folio-toc-panel" id="folio-toc-panel">
    <div class="folio-toc-header">
      <span class="folio-toc-title">Contents</span>
      <button class="folio-toc-close" id="folio-toc-close" title="Close" aria-label="Close table of contents"></button>
    </div>
    <ul class="folio-toc-list" id="folio-toc-list"></ul>
  </aside>

  <article class="folio-document" id="content">
    <p style="color: var(--fg-secondary);">Waiting for content from Neovim…</p>
  </article>
  <div id="folio-status">
    <span class="folio-status-dot" id="folio-dot"></span>
    <span id="folio-status-text">folio · disconnected</span>
  </div>

  <!-- Image lightbox -->
  <div class="folio-lightbox" id="folio-lightbox">
    <img id="folio-lightbox-img" src="" alt="">
  </div>

  <script src="/vendor/highlight.js/highlight.min.js"></script>
  <script src="/vendor/katex/katex.min.js"></script>
  <script src="/vendor/katex/auto-render.min.js"></script>
  <script src="/vendor/mermaid/mermaid.min.js"></script>
  <script src="/vendor/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
