<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>folio preview</title>
  <!-- KaTeX for LaTeX math -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.21/katex.min.css">
  <!-- Mermaid for diagram rendering -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --code-bg: #f5f5f5;
      --border: #e0e0e0;
      --link: #2563eb;
      --muted: #6b7280;
      --highlight-bg: #fef3c7;
      --font-mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --fg: #e0e0e0;
        --code-bg: #2a2a2a;
        --border: #3a3a3a;
        --link: #60a5fa;
        --muted: #9ca3af;
        --highlight-bg: #422006;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }

    article h1, article h2, article h3, article h4, article h5, article h6 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }
    article h1 { font-size: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
    article h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
    article h3 { font-size: 1.25rem; }

    article p { margin-bottom: 1em; }

    article a { color: var(--link); text-decoration: none; }
    article a:hover { text-decoration: underline; }

    /* ── Code blocks ─────────────────────────────────── */
    article pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0;
      overflow-x: auto;
      margin-bottom: 1.25em;
      position: relative;
    }
    article pre > code {
      display: block;
      padding: 1rem;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.85em;
      line-height: 1.6;
    }
    /* Override hljs background — use our pre background instead. */
    article pre > code.hljs {
      background: transparent;
      padding: 1rem;
    }
    /* Language label badge. */
    article pre > code[class*="language-"]::before {
      content: attr(data-lang);
      position: absolute;
      top: 0;
      right: 0.75rem;
      padding: 0.15em 0.6em;
      font-size: 0.7em;
      font-family: var(--font-mono);
      color: var(--muted);
      background: var(--code-bg);
      border-bottom-left-radius: 6px;
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    /* Inline code. */
    article :not(pre) > code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.9em;
    }

    article blockquote {
      border-left: 4px solid var(--link);
      padding: 0.25em 1em;
      margin-bottom: 1em;
      color: var(--muted);
    }

    article ul, article ol { padding-left: 2em; margin-bottom: 1em; }
    article li { margin-bottom: 0.25em; }

    article img { max-width: 100%; height: auto; border-radius: 6px; margin: 1em 0; }

    article hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    article table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1em;
    }
    article th, article td {
      border: 1px solid var(--border);
      padding: 0.5em 0.75em;
      text-align: left;
    }
    article th { background: var(--code-bg); font-weight: 600; }

    /* Scroll-sync highlight */
    .folio-cursor-line {
      background: var(--highlight-bg);
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    /* Status bar */
    #folio-status {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--code-bg);
      border-top: 1px solid var(--border);
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Loading / disconnected overlay */
    #folio-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #f59e0b;
      color: #1a1a1a;
      text-align: center;
      padding: 0.4rem;
      font-size: 0.85rem;
      z-index: 999;
    }
    #folio-overlay.disconnected {
      display: block;
      background: #ef4444;
      color: white;
    }

    /* Mermaid diagram container */
    .mermaid {
      text-align: center;
      margin: 1em 0;
      overflow-x: auto;
    }
    .mermaid svg {
      max-width: 100%;
      height: auto;
    }

    /* KaTeX overrides */
    .katex-display { overflow-x: auto; overflow-y: hidden; }
    .katex { font-size: 1.1em; }
  </style>
</head>
<body>
  <div id="folio-overlay">Disconnected — Neovim session ended.</div>
  <article class="folio-document" id="content">
    <p style="color: var(--muted);">Waiting for content from Neovim…</p>
  </article>
  <div id="folio-status">folio · disconnected</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.21/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.21/contrib/auto-render.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/11.12.0/mermaid.min.js"></script>
  <script>
  (function() {
    // ── WebSocket connection ────────────────────────────────────
    var bufnr = new URLSearchParams(location.search).get("bufnr") || "1";
    var protocol = location.protocol === "https:" ? "wss:" : "ws:";
    var wsUrl = protocol + "//" + location.host + "/ws/?bufnr=" + bufnr;
    var ws;
    var contentEl = document.getElementById("content");
    var overlayEl = document.getElementById("folio-overlay");
    var statusEl = document.getElementById("folio-status");
    var currentScrollLine = null;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = function() {
        overlayEl.classList.remove("disconnected");
        statusEl.textContent = "folio · connected (buf " + bufnr + ")";
      };
      ws.onmessage = function(ev) {
        try {
          var msg = JSON.parse(ev.data);
          handleMessage(msg);
        } catch (e) {
          console.error("folio: failed to parse message", e);
        }
      };
      ws.onclose = function() {
        overlayEl.classList.add("disconnected");
        statusEl.textContent = "folio · disconnected";
        // Auto-reconnect after 1s.
        setTimeout(connect, 1000);
      };
      ws.onerror = function() {
        ws.close();
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case "render":
          if (msg.html) {
            contentEl.innerHTML = msg.html;
            // Rewrite relative image/src URLs to fetch from the file's directory.
            rewriteAssetUrls(contentEl);
            // Apply syntax highlighting to all code blocks.
            if (typeof hljs !== 'undefined') {
              contentEl.querySelectorAll('pre code[class*="language-"]').forEach(function(el) {
                hljs.highlightElement(el);
              });
            }
            // Render Mermaid diagrams before KaTeX (Mermaid may contain math).
            if (typeof mermaid !== 'undefined') {
              renderMermaidDiagrams(contentEl);
            }
            // Render LaTeX math with KaTeX auto-render.
            if (typeof renderMathInElement !== 'undefined') {
              try {
                renderMathInElement(contentEl, {
                  delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\[', right: '\\]', display: true},
                    {left: '\\(', right: '\\)', display: false}
                  ],
                  throwOnError: false
                });
              } catch(e) { console.warn('KaTeX render error:', e); }
            }
          }
          if (msg.scroll_to_line) {
            scrollToLine(msg.scroll_to_line);
          }
          break;
        case "scroll":
          if (msg.scroll_to_line) {
            scrollToLine(msg.scroll_to_line);
          }
          break;
      }
    }

    // ── Asset URL rewriting ─────────────────────────────────────

    function rewriteAssetUrls(root) {
      // Images: <img src="images/foo.png"> → <img src="/files/{bufnr}/images/foo.png">
      root.querySelectorAll("img[src]").forEach(function(img) {
        var src = img.getAttribute("src");
        if (src && !/^(https?:|data:|#|\/)/.test(src)) {
          img.src = "/files/" + bufnr + "/" + src;
        }
      });
    }

    // ── Mermaid diagram rendering ──────────────────────────────

    // Initialize mermaid once.
    if (typeof mermaid !== 'undefined') {
      try {
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        // Detect dark mode for mermaid.
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        }
      } catch(e) {}
    }

    function renderMermaidDiagrams(root) {
      // Find <pre><code class="language-mermaid"> and transform them.
      var candidates = root.querySelectorAll('pre code[class*="language-mermaid"]');
      if (candidates.length === 0) return;
      var toRender = [];
      candidates.forEach(function(code) {
        var pre = code.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        pre.parentElement.replaceChild(div, pre);
        toRender.push(div);
      });
      // Render all mermaid diagrams at once.
      if (toRender.length > 0) {
        try { mermaid.run({ nodes: toRender }); } catch(e) { console.warn('Mermaid error:', e); }
      }
    }

    // ── Scroll sync: anchor interpolation ──────────────────────

    function scrollToLine(line) {
      if (line === currentScrollLine) return;
      currentScrollLine = line;

      // Remove previous highlight.
      var prev = contentEl.querySelector(".folio-cursor-line");
      if (prev) prev.classList.remove("folio-cursor-line");

      // Find the element with data-source-line == line.
      var target = contentEl.querySelector('[data-source-line="' + line + '"]');

      // Fallback: walk upward to the nearest block with a data-source-line.
      if (!target) {
        var allBlocks = contentEl.querySelectorAll("[data-source-line]");
        var best = null;
        for (var i = 0; i < allBlocks.length; i++) {
          var l = parseInt(allBlocks[i].getAttribute("data-source-line"), 10);
          if (l <= line && (!best || l > best.l)) {
            best = { el: allBlocks[i], l: l };
          }
        }
        target = best ? best.el : null;
      }

      if (!target) return;

      // Highlight current line's block.
      target.classList.add("folio-cursor-line");

      // Smooth scroll with anchor interpolation.
      // Find the NEXT block to estimate the pixel range for this line.
      var nextBlock = target.nextElementSibling;
      while (nextBlock && !nextBlock.hasAttribute("data-source-line")) {
        nextBlock = nextBlock.nextElementSibling;
      }

      var targetTop = target.getBoundingClientRect().top + window.scrollY;
      if (nextBlock) {
        var nextTop = nextBlock.getBoundingClientRect().top + window.scrollY;
        var nextLine = parseInt(nextBlock.getAttribute("data-source-line"), 10);
        var totalSrcLines = nextLine - parseInt(target.getAttribute("data-source-line"), 10);
        var pixelSpan = nextTop - targetTop;

        if (totalSrcLines > 0 && pixelSpan > 0) {
          var offsetLines = line - parseInt(target.getAttribute("data-source-line"), 10);
          var ratio = offsetLines / totalSrcLines;
          targetTop += pixelSpan * ratio;
        }
      }

      // Scroll with a ~10vh top margin so the line isn't at the very edge.
      var margin = window.innerHeight * 0.1;
      window.scrollTo({ top: targetTop - margin, behavior: "smooth" });
    }

    // ── Bootstrap ───────────────────────────────────────────────

    connect();
  })();
  </script>
</body>
</html>
